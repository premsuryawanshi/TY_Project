<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 700px;
        }
        h1, h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 16px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        input{
            height: 7px;
        }
        textarea{
            height: 20px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            margin-top: 20px;
            
        }
        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Buyer Registration</h1>
        <!-- <h2>Farmer Registration</h2> -->
        <form>
            <div class="form-group">
                <label for="productName">Full Name</label>
                <input type="text" id="Full Name" name="Name" required>
            </div>
            
            <div class="form-group">
                <label for="quantity">Mobile Number</label>
                <input type="number" id="quantity" name="quantity" required pattern="[0-9]{10}>
            </div>
            
            <div class="form-group"> <br>
                <label for="address">Address</label>
                <textarea id="address" name="address" rows="4" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="password">password</label>
                <input type="password" id="password" name="pass" required>
            </div>
            
            <div class="form-group">
                <label for="Addhar">Adhar Name </label>
                <input type="number" id="Adhar" name="Adhar Name"  pattern="[0-9]{12}"  required>
            </div>
            
            
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
