<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Data Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: green;
            color: black;
            font-weight: bolder;
        }
    </style>
</head>
<body>
    <h2>Market Data Table</h2>
    <table>
        <thead>
            <tr>
                <th>Full texts</th>
                <th>Id</th>
                <th>Date</th>
                <th>State</th>
                <th>District</th>
                <th>Taluka</th>
                <th>Market</th>
                <th>Commodity</th>
                <th>Variety</th>
                <th>Max Price</th>
                <th>Min Price</th>
                <th>Avg Price</th>
                <th>Flag</th>
                <th>Created Date</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Sample Text</td>
                <td>1</td>
                <td>2025-02-23</td>
                <td>State Name</td>
                <td>District Name</td>
                <td>Taluka Name</td>
                <td>Market Name</td>
                <td>Commodity Name</td>
                <td>Variety Name</td>
                <td>1000</td>
                <td>800</td>
                <td>900</td>
                <td>Active</td>
                <td>2025-02-23</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
